services:
  backend:
    build:
      context: ./backend
    ports:
      - "19001:19001"
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      REASONER_MODE: ${REASONER_MODE:-ollama}
      STRICT_REASONER: ${STRICT_REASONER:-false}
      RAG_RETRIEVER: ${RAG_RETRIEVER:-hybrid}
      RAG_REBUILD_INDEX: ${RAG_REBUILD_INDEX:-false}
      RAG_DATA_DIR: /app/data
      TRIAGE_ENABLE_EMBEDDING_SIGNAL: ${TRIAGE_ENABLE_EMBEDDING_SIGNAL:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://triage:triage@postgres:5432/triage}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      DB_AUTO_CREATE: ${DB_AUTO_CREATE:-false}
    volumes:
      - ./backend/data:/app/data
      - rag_cache:/app/.cache
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 19001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:19001/api/v1/health/ready')
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 45s

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:19001}
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:5173 >/dev/null 2>&1 || exit 1
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
          ollama serve &
          pid=$$!
          until ollama list >/dev/null 2>&1; do sleep 2; done
          ollama pull "$$OLLAMA_MODEL"
          wait "$$pid"
    healthcheck:
      test:
        - CMD-SHELL
        - ollama list | grep -F "$$OLLAMA_MODEL" >/dev/null 2>&1 || exit 1
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-triage}
      POSTGRES_USER: ${POSTGRES_USER:-triage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  rag_cache:
  ollama_models:
  postgres_data:
